name: Xcode - Build and Analyze

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and analyze linkq
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve packages
        run: xcodebuild -project linkq.xcodeproj -scheme linkq -resolvePackageDependencies

      - name: Build
        run: |
          xcodebuild clean build analyze \
            -project linkq.xcodeproj \
            -scheme linkq \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
