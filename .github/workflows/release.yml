name: Release macOS App

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    name: Build, notarize, and publish
    runs-on: macos-latest

    env:
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      DEVELOPER_ID_APPLICATION: ${{ vars.DEVELOPER_ID_APPLICATION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set build paths
        run: |
          echo "ARCHIVE_PATH=$RUNNER_TEMP/linkq.xcarchive" >> "$GITHUB_ENV"
          echo "EXPORT_PATH=$RUNNER_TEMP/linkq-export" >> "$GITHUB_ENV"

      - name: Validate release secrets
        run: |
          missing=0

          for name in MACOS_CERTIFICATE_P12_BASE64 MACOS_CERTIFICATE_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing secret::$name is required"
              missing=1
            fi
          done

          if [ -z "$APPLE_TEAM_ID" ]; then
            echo "::error title=Missing variable::APPLE_TEAM_ID repository variable is required"
            missing=1
          fi

          exit "$missing"
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      - name: Resolve packages
        run: xcodebuild -project linkq.xcodeproj -scheme linkq -resolvePackageDependencies

      - name: Archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SIGNING_IDENTITY="${DEVELOPER_ID_APPLICATION:-Developer ID Application}"

          xcodebuild archive \
            -project linkq.xcodeproj \
            -scheme linkq \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER"

      - name: Export Developer ID app
        run: |
          SIGNING_IDENTITY="${DEVELOPER_ID_APPLICATION:-Developer ID Application}"
          EXPORT_OPTIONS_PLIST="$RUNNER_TEMP/ExportOptions.plist"

          /usr/libexec/PlistBuddy -c "Clear dict" "$EXPORT_OPTIONS_PLIST"
          /usr/libexec/PlistBuddy -c "Add :method string developer-id" "$EXPORT_OPTIONS_PLIST"
          /usr/libexec/PlistBuddy -c "Add :teamID string $APPLE_TEAM_ID" "$EXPORT_OPTIONS_PLIST"
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" "$EXPORT_OPTIONS_PLIST"
          /usr/libexec/PlistBuddy -c "Add :signingCertificate string $SIGNING_IDENTITY" "$EXPORT_OPTIONS_PLIST"
          /usr/libexec/PlistBuddy -c "Add :stripSwiftSymbols bool true" "$EXPORT_OPTIONS_PLIST"

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST"

      - name: Re-sign exported app
        run: |
          APP_PATH="$EXPORT_PATH/linkq.app"
          SIGNING_IDENTITY="${DEVELOPER_ID_APPLICATION:-Developer ID Application}"
          ENTITLEMENTS_DIR="$RUNNER_TEMP/entitlements"

          mkdir -p "$ENTITLEMENTS_DIR"

          # Xcode export leaves this legacy resource envelope in this project,
          # which makes strict verification fail after notarization stapling.
          rm -f "$APP_PATH/Contents/CodeResources"

          # Preserve the entitlements generated by Xcode while applying the
          # Developer ID signature consistently to nested helpers and the app.
          codesign -d --entitlements :- \
            "$APP_PATH/Contents/Library/LaunchServices/com.notfullin.linkqPrivilegedHelper" \
            > "$ENTITLEMENTS_DIR/privileged-helper.plist"
          codesign -d --entitlements :- \
            "$APP_PATH/Contents/Library/LoginItems/linkqHelper.app" \
            > "$ENTITLEMENTS_DIR/login-helper.plist"
          codesign -d --entitlements :- \
            "$APP_PATH" \
            > "$ENTITLEMENTS_DIR/linkq.plist"

          codesign --force \
            --options runtime \
            --sign "$SIGNING_IDENTITY" \
            --entitlements "$ENTITLEMENTS_DIR/privileged-helper.plist" \
            "$APP_PATH/Contents/Library/LaunchServices/com.notfullin.linkqPrivilegedHelper"

          codesign --force \
            --options runtime \
            --sign "$SIGNING_IDENTITY" \
            --entitlements "$ENTITLEMENTS_DIR/login-helper.plist" \
            "$APP_PATH/Contents/Library/LoginItems/linkqHelper.app"

          codesign --force \
            --options runtime \
            --sign "$SIGNING_IDENTITY" \
            --entitlements "$ENTITLEMENTS_DIR/linkq.plist" \
            "$APP_PATH"

          codesign --verify --deep --strict --verbose=4 "$APP_PATH"

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          APP_PATH="$EXPORT_PATH/linkq.app"
          NOTARY_ZIP="$RUNNER_TEMP/linkq-notary.zip"

          ditto -c -k --keepParent "$APP_PATH" "$NOTARY_ZIP"

          xcrun notarytool submit "$NOTARY_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$APP_PATH"
          spctl --assess --type execute --verbose=4 "$APP_PATH"

      - name: Package release asset
        id: package
        run: |
          APP_PATH="$EXPORT_PATH/linkq.app"
          VERSION="${GITHUB_REF_NAME#v}"
          ASSET_PATH="$RUNNER_TEMP/linkq-${VERSION}.zip"

          ditto -c -k --keepParent "$APP_PATH" "$ASSET_PATH"
          echo "asset_path=$ASSET_PATH" >> "$GITHUB_OUTPUT"
          echo "asset_name=$(basename "$ASSET_PATH")" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --title "linkq $GITHUB_REF_NAME" \
              --notes "Release $GITHUB_REF_NAME"
          fi

          gh release upload "$GITHUB_REF_NAME" \
            "${{ steps.package.outputs.asset_path }}#${{ steps.package.outputs.asset_name }}" \
            --clobber

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.asset_name }}
          path: ${{ steps.package.outputs.asset_path }}
          if-no-files-found: error
